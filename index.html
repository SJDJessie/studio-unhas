<!DOCTYPE html>
<html lang="pt-BR">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Studio SJD</title>
    <style>
        :root {
            --primary: #c2185b;
            --primary-light: #ffe6f2;
            --secondary: #8e24aa;
            --success: #128C7E;
            --success-light: #25D366;
            --dark: #2d131e;
            --text: #333333;
            --bg-card: #ffffff;
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        }

        body {
            background: linear-gradient(135deg, #fdf4f7 0%, #ffffff 100%);
            padding: 20px;
            padding-bottom: 150px; /* Évite que la barre du bas ne cache les services */
            color: var(--text);
            min-height: 100vh;
        }

        .container {
            max-width: 600px;
            margin: auto;
        }

        /* EN-TÊTE ÉLÉGANT ET NET */
        .header {
            text-align: center;
            margin-top: 20px;
            margin-bottom: 35px;
            padding: 10px;
        }

        .header h1 {
            font-size: 46px;
            color: var(--primary);
            font-weight: 700;
            letter-spacing: -0.5px;
            margin-bottom: 6px;
        }

        .header .specialties {
            font-size: 15px;
            font-weight: 600;
            color: #b05a7e;
            text-transform: uppercase;
            letter-spacing: 2px;
            margin-bottom: 12px;
        }

        .header p {
            font-size: 16px;
            color: #777;
        }

        /* TITRES DE CATÉGORIES DESIGN */
        .category-title {
            color: var(--dark);
            font-size: 20px;
            font-weight: 700;
            margin: 35px 0 15px 0;
            display: flex;
            align-items: center;
            gap: 8px;
        }

        .category-title::after {
            content: '';
            flex: 1;
            height: 2px;
            background: linear-gradient(to right, var(--primary-light), transparent);
        }

        /* CARTES DE SERVICES ÉPURÉES */
        .card {
            background: var(--bg-card);
            padding: 22px;
            border-radius: 24px;
            margin-bottom: 16px;
            box-shadow: 0 10px 25px rgba(216, 27, 96, 0.05);
            border: 1px solid rgba(216, 27, 96, 0.08);
            transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
        }

        .card.selected-card {
            border-color: var(--success-light);
            box-shadow: 0 10px 30px rgba(37, 211, 102, 0.15);
            background-color: #f7fdf9;
            transform: translateY(-2px);
        }

        .card h2 {
            color: var(--dark);
            font-size: 20px;
            font-weight: 600;
            margin-bottom: 6px;
        }

        .price {
            font-size: 22px;
            font-weight: 700;
            color: var(--primary);
            margin-bottom: 18px;
        }

        /* INPUTS MODERNES */
        .input-group {
            display: flex;
            gap: 10px;
            margin-bottom: 15px;
        }

        input {
            flex: 1;
            padding: 14px;
            border-radius: 14px;
            border: 1px solid #e0e0e0;
            font-size: 15px;
            background-color: #fafafa;
            color: var(--text);
            outline: none;
            transition: 0.2s;
        }

        input:focus {
            border-color: var(--primary);
            background-color: #fff;
        }

        /* BOUTONS AVEC DES EFFETS MODERNES */
        .btn {
            width: 100%;
            padding: 14px;
            border: none;
            border-radius: 16px;
            font-weight: 600;
            cursor: pointer;
            font-size: 16px;
            display: flex;
            justify-content: center;
            align-items: center;
            gap: 8px;
            box-shadow: 0 4px 10px rgba(0, 0, 0, 0.05);
            transition: all 0.2s ease;
        }

        .whatsapp {
            background: var(--success-light);
            color: white;
        }

        .whatsapp.active {
            background: var(--success);
            box-shadow: inset 0 2px 5px rgba(0,0,0,0.2);
        }

        .btn:hover {
            transform: translateY(-1px);
            filter: brightness(1.03);
        }

        .btn:active {
            transform: translateY(1px);
        }

        /* BARRE DE TOTAL SUBLIME ET FIXE */
        .total-bar {
            position: fixed;
            bottom: 0;
            left: 0;
            width: 100%;
            background: linear-gradient(135deg, #2b0816 0%, var(--dark) 100%);
            color: white;
            padding: 20px;
            box-shadow: 0 -10px 30px rgba(0,0,0,0.25);
            display: none;
            flex-direction: column;
            align-items: center;
            gap: 15px;
            z-index: 1000;
            border-top-left-radius: 28px;
            border-top-right-radius: 28px;
            animation: slideUp 0.4s cubic-bezier(0.4, 0, 0.2, 1);
        }

        @keyframes slideUp {
            from { transform: translateY(100%); }
            to { transform: translateY(0); }
        }

        .total-info {
            text-align: center;
        }

        .total-title {
            font-size: 24px;
            font-weight: 700;
            letter-spacing: 0.5px;
        }

        .total-details {
            font-size: 13px;
            color: #ffccd8;
            margin-top: 4px;
            font-weight: 500;
            max-width: 90%;
            margin-left: auto;
            margin-right: auto;
        }

        .pix-main {
            background: linear-gradient(135deg, #a239be 0%, var(--secondary) 100%);
            color: white;
            max-width: 400px;
            box-shadow: 0 6px 15px rgba(142, 36, 170, 0.3);
        }

        .footer {
            text-align: center;
            margin-top: 45px;
            font-size: 14px;
            color: #999;
            font-weight: 500;
        }
    </style>
</head>

<body>

    <div class="container">
        <div class="header">
            <h1>Studio SJD</h1>
            <div class="specialties">Cabelo • Maquiagem • Unhas</div>
            <p>Agende seu horário pelo WhatsApp ✨</p>
        </div>

        <div class="category-title">💇&zwj;♀️ Cabelo</div>
        <div id="cabelo-services"></div>

        <div class="category-title">💄 Maquiagem</div>
        <div id="maquiagem-services"></div>

        <div class="category-title">💅 Unhas</div>
        <div id="unhas-services"></div>

        <div class="footer">
            Atendimento com qualidade e carinho 💖
        </div>
    </div>

    <div id="totalBar" class="total-bar">
        <div class="total-info">
            <div class="total-title" id="totalValue">Total: R$ 0</div>
            <div class="total-details" id="totalDetails">Selecionado: </div>
        </div>
        <button class="btn pix-main" onclick="pagarPixTotal()">
            💳 Pagar todos com Pix
        </button>
    </div>

    <script>
        const whatsapp = '5511954845853';
        const pixKey = 'simon.c.personnal@gmail.com';

        // Base de données des services
        const services = [
            { id: 1, category: 'cabelo', name: 'Escova e Lavagem', price: 60 },
            { id: 2, category: 'cabelo', name: 'Corte de Cabelo', price: 80 },
            { id: 3, category: 'maquiagem', name: 'Maquiagem Simples', price: 100 },
            { id: 4, category: 'maquiagem', name: 'Maquiagem Profissional', price: 180 },
            { id: 5, category: 'unhas', name: 'Alongamento de fibra', price: 200 },
            { id: 6, category: 'unhas', name: 'Manutenção de fibra', price: 120 },
            { id: 7, category: 'unhas', name: 'Unha normal', price: 30 }
        ];

        let selectedServices = {};

        // Construction de l'interface
        services.forEach(service => {
            const categoryContainer = document.getElementById(`${service.category}-services`);
            if (!categoryContainer) return;

            const card = document.createElement('div');
            card.className = 'card';
            card.id = `card-${service.id}`;

            card.innerHTML = `
                <h2>${service.name}</h2>
                <div class="price">R$ ${service.price}</div>
                <div class="input-group">
                    <input type="date" id="date-${service.id}">
                    <input type="time" id="time-${service.id}">
                </div>
                <button class="btn whatsapp" id="btn-${service.id}" onclick="toggleService(${service.id})">
                    <span>📅 Marcar horário</span>
                </button>
            `;
            categoryContainer.appendChild(card);
        });

        // Logique de sélection
        function toggleService(id) {
            const service = services.find(s => s.id === id);
            const card = document.getElementById(`card-${id}`);
            const btn = document.getElementById(`btn-${id}`);
            const dateVal = document.getElementById(`date-${id}`).value;
            const timeVal = document.getElementById(`time-${id}`).value;

            if (selectedServices[id]) {
                delete selectedServices[id];
                card.classList.remove('selected-card');
                btn.classList.remove('active');
                btn.innerHTML = `<span>📅 Marcar horário</span>`;
            } else {
                // Formatage propre des dates pour l'affichage récapitulatif
                let formattedDate = "(Sem data)";
                if(dateVal) {
                    const parts = dateVal.split('-');
                    formattedDate = `${parts[2]}/${parts[1]}`;
                }

                selectedServices[id] = {
                    name: service.name,
                    price: service.price,
                    date: dateVal,
                    formattedDate: formattedDate,
                    time: timeVal || "(Sem hora)"
                };
                card.classList.add('selected-card');
                btn.classList.add('active');
                btn.innerHTML = `<span>✅ Selecionado</span>`;
            }

            calculerSomme();
        }

        // Calcul dynamique
        function calculerSomme() {
            const totalBar = document.getElementById('totalBar');
            const totalValue = document.getElementById('totalValue');
            const totalDetails = document.getElementById('totalDetails');
            
            let total = 0;
            let detailsText = [];
            let keys = Object.keys(selectedServices);

            if (keys.length === 0) {
                totalBar.style.display = 'none';
                return;
            }

            keys.forEach(id => {
                let s = selectedServices[id];
                total += s.price;
                detailsText.push(`${s.name}`);
            });

            totalValue.textContent = `Total: R$ ${total}`;
            totalDetails.textContent = `Selecionado: ${detailsText.join(', ')}`;
            totalBar.style.display = 'flex';
        }

        // Traitement de la commande finale
        function pagarPixTotal() {
            navigator.clipboard.writeText(pixKey);

            let total = 0;
            let messageServices = "";

            Object.keys(selectedServices).forEach(id => {
                let s = selectedServices[id];
                total += s.price;
                
                // Formater la date en style Brésilien DD/MM/YYYY pour le message WhatsApp
                let dataBr = s.date ? s.date.split('-').reverse().join('/') : "(Não definida)";
                
                messageServices += `\n• *${s.name}* (R$ ${s.price})\n  Data: ${dataBr} às ${s.time}\n`;
            });

            alert(
                '✨ Chave Pix copiada com sucesso! \n\n' +
                'Total: R$ ' + total + '\n' +
                'Chave Pix: ' + pixKey + '\n\n' +
                'Clique em OK para enviar os dados de agendamento pelo WhatsApp.'
            );

            const mensagem = `Olá! Quero agendar os seguintes serviços no Studio SJD:${messageServices}\n*Total Geral: R$ ${total}*`;
            const link = `https://wa.me/${whatsapp}?text=${encodeURIComponent(mensagem)}`;
            window.open(link, '_blank');
        }
    </script>
</body>

</html>
