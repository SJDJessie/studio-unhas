<!DOCTYPE html>
<html lang="pt-BR">

<head>

<meta charset="UTF-8">

<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Studio de Unhas</title>

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:Arial,sans-serif;
}

body{
background:linear-gradient(to bottom,#ffe6f2,#ffffff);
padding:20px;
color:#333;
}

.container{
max-width:700px;
margin:auto;
}

.header{
text-align:center;
margin-bottom:30px;
}

.header h1{
font-size:40px;
color:#d81b60;
margin-bottom:10px;
}

.header p{
font-size:18px;
color:#666;
}

.card{
background:white;
padding:20px;
border-radius:20px;
margin-bottom:20px;
box-shadow:0 5px 15px rgba(0,0,0,0.1);
}

.card h2{
color:#c2185b;
margin-bottom:10px;
}

.price{
font-size:22px;
font-weight:bold;
margin-bottom:15px;
}

input{
width:100%;
padding:12px;
margin-bottom:10px;
border-radius:10px;
border:1px solid #ccc;
font-size:16px;
}

.buttons{
display:flex;
gap:10px;
flex-wrap:wrap;
}

.btn{
flex:1;
padding:12px;
border:none;
border-radius:12px;
font-weight:bold;
cursor:pointer;
transition:0.3s;
font-size:16px;
}

.whatsapp{
background:#25D366;
color:white;
}

.pix{
background:#8e24aa;
color:white;
}

.btn:hover{
opacity:0.85;
}

.footer{
text-align:center;
margin-top:30px;
font-size:14px;
color:#777;
}

</style>

</head>

<body>

<div class="container">

<div class="header">

<h1>💅 Studio de Unhas</h1>

<p>
Agende seu horário pelo WhatsApp ✨
</p>

</div>

<div id="services"></div>

<div class="footer">

Atendimento com qualidade e carinho 💖

</div>

</div>

<script>

const whatsapp = '5511954845853';

const pixKey = 'simon.c.personnal@gmail.com';

const services = [

{
name:'Alongamento de fibra',
price:'R$ 200'
},

{
name:'Manutenção de alongamento de fibra',
price:'R$ 120'
},

{
name:'Alongamento de gel',
price:'R$ 120'
},

{
name:'Manutenção de gel',
price:'R$ 80'
},

{
name:'Banho de gel',
price:'R$ 80'
},

{
name:'Unha normal',
price:'R$ 30'
},

{
name:'Unha postiça',
price:'R$ 100'
}

];

const container = document.getElementById('services');

services.forEach(service=>{

const card = document.createElement('div');

card.className='card';

card.innerHTML = `

<h2>${service.name}</h2>

<div class="price">${service.price}</div>

<input type="date" id="date-${service.name}">

<input type="time" id="time-${service.name}">

<div class="buttons">

<button class="btn whatsapp"

onclick="marcarHorario('${service.name}','${service.price}')">

📅 Marcar horário

</button>

<button class="btn pix"

onclick="pagarPix('${service.name}','${service.price}')">

💳 Pagar com Pix

</button>

</div>

`;

container.appendChild(card);

});

function marcarHorario(servico,preco){

const data =

document.getElementById('date-'+servico).value;

const hora =

document.getElementById('time-'+servico).value;

const mensagem =

`Olá! Quero agendar:

Serviço: ${servico}
Preço: ${preco}
Data: ${data}
Hora: ${hora}`;

const link =

`https://wa.me/${whatsapp}?text=${encodeURIComponent(mensagem)}`;

window.open(link,'_blank');

}

function pagarPix(servico,preco){

navigator.clipboard.writeText(pixKey);

alert(

'Serviço: ' + servico +

'\\nValor: ' + preco +

'\\n\\nChave Pix copiada:\\n' + pixKey

);

}

</script>

</body>

</html>
