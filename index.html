<style>
:root{

    --white:#ffffff;
    --gray:#b5b5c3;
    --green:#25D366;
}

*{
    margin:0;
    padding:0;
    box-sizing:border-box;
    font-family:'Poppins',sans-serif;
}

body{
    background:
    radial-gradient(circle at top left, rgba(255,47,125,0.20), transparent 30%),
    radial-gradient(circle at bottom right, rgba(255,47,125,0.15), transparent 25%),
    linear-gradient(135deg,#0b0b0f,#12121a,#1a1a22);
    min-height:100vh;

.container{

.logo-circle{
    width:100px;

<body>

<div class="container">

<div class="header">
<div class="logo-circle">💖</div>

<h1>Studio SJD</h1>

<div class="specialties">
Cabelo • Maquiagem • Unhas
</div>

<div class="subtitle">
Agende seu horário pelo WhatsApp ✨
</div>

<div class="whatsapp-top">
📲 Atendimento rápido e profissional
</div>
</div>

<div class="category-title">💇‍♀️ Cabelo</div>
<div id="cabelo-services"></div>

<div class="category-title">💄 Maquiagem</div>
<div id="maquiagem-services"></div>

<div class="category-title">💅 Unhas</div>
<div id="unhas-services"></div>

<div class="footer">
Studio SJD © Atendimento premium com carinho ✨
</div>

</div>

<div id="totalBar" class="total-bar">
<div class="total-title" id="totalValue">Total: R$ 0</div>
<div class="total-details" id="totalDetails"></div>

<button class="btn pix-btn" onclick="pagarPixTotal()">
💳 Pagar todos com Pix
</button>
</div>

<script>
const whatsapp = '5511954845853';
const pixKey = 'simon.c.personnal@gmail.com';

const services = [
    { id: 1, category: 'cabelo', name: 'Escova e Lavagem', price: 60 },
    { id: 2, category: 'cabelo', name: 'Corte de Cabelo', price: 80 },
    { id: 3, category: 'maquiagem', name: 'Maquiagem Simples', price: 100 },
    { id: 4, category: 'maquiagem', name: 'Maquiagem Profissional', price: 180 },
    { id: 5, category: 'unhas', name: 'Alongamento de fibra', price: 200 },
    { id: 6, category: 'unhas', name: 'Manutenção de fibra', price: 120 },
    { id: 7, category: 'unhas', name: 'Unha normal', price: 30 }
];

let selectedServices = {};

services.forEach(service => {

    const categoryContainer = document.getElementById(`${service.category}-services`);

    const card = document.createElement('div');
    card.className = 'card';
    card.id = `card-${service.id}`;

    card.innerHTML = `
        <h2>${service.name}</h2>
        <div class="price">R$ ${service.price}</div>

        <div class="input-group">
            <input type="date" id="date-${service.id}">
            <input type="time" id="time-${service.id}">
        </div>

        <button class="btn whatsapp-btn" id="btn-${service.id}" onclick="toggleService(${service.id})">
            📅 Marcar horário
        </button>
    `;

    categoryContainer.appendChild(card);
});

function toggleService(id){

    const service = services.find(s => s.id === id);

    const card = document.getElementById(`card-${id}`);
    const btn = document.getElementById(`btn-${id}`);

    const dateVal = document.getElementById(`date-${id}`).value;
    const timeVal = document.getElementById(`time-${id}`).value;

    if(selectedServices[id]){
        delete selectedServices[id];
        card.classList.remove('selected-card');
        btn.classList.remove('active');
        btn.innerHTML = '📅 Marcar horário';
    }
    else{
        selectedServices[id] = {
            name: service.name,
            price: service.price,
            date: dateVal,
            time: timeVal
        };

        card.classList.add('selected-card');
        btn.classList.add('active');
        btn.innerHTML = '✅ Selecionado';
    }

    calculerSomme();
}

function calculerSomme(){

    const totalBar = document.getElementById('totalBar');
    const totalValue = document.getElementById('totalValue');
    const totalDetails = document.getElementById('totalDetails');

    let total = 0;
    let details = [];

    Object.keys(selectedServices).forEach(id => {
        total += selectedServices[id].price;
        details.push(selectedServices[id].name);
    });

    if(total <= 0){
        totalBar.style.display = 'none';
        return;
    }

    totalBar.style.display = 'flex';
    totalValue.innerHTML = `Total: R$ ${total}`;
    totalDetails.innerHTML = details.join(', ');
}

function pagarPixTotal(){

    navigator.clipboard.writeText(pixKey);

    let total = 0;
    let messageServices = '';

    Object.keys(selectedServices).forEach(id => {

        let s = selectedServices[id];

        total += s.price;

        messageServices += `\n• ${s.name} - R$ ${s.price}`;
    });

    alert('✨ Chave Pix copiada com sucesso!');

    const mensagem = `Olá! Quero agendar os seguintes serviços:${messageServices}\n\nTotal: R$ ${total}`;

    const link = `https://wa.me/${whatsapp}?text=${encodeURIComponent(mensagem)}`;

    window.open(link,'_blank');
}
</script>

</body>
</html>
