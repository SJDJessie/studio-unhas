<!DOCTYPE html>
<html lang="pt-BR">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Studio SJD</title>
    <style>
        :root {
            --primary: #c2185b;
            --primary-light: #ffe6f2;
            --secondary: #8e24aa;
            --success: #128C7E;
            --success-light: #25D366;
            --dark: #2d131e;
            --text: #333333;
            --bg-card: #ffffff;
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        }

        body {
            background: linear-gradient(135deg, #fdf4f7 0%, #ffffff 100%);
            padding: 20px;
            padding-bottom: 150px; /* Évite que la barre du bas ne cache les services */
            color: var(--text);
            min-height: 100vh;
        }

        .container {
            max-width: 600px;
            margin: auto;
        }

        /* EN-TÊTE ÉLÉGANT ET NET */
        .header {
            text-align: center;
            margin-top: 20px;
            margin-bottom: 35px;
            padding: 10px;
        }

        .header h1 {
            font-size: 46px;
            color: var(--primary);
            font-weight: 700;
            letter-spacing: -0.5px;
            margin-bottom: 6px;
        }

        .header .specialties {
            font-size: 15px;
            font-weight: 600;
            color: #b05a7e;
            text-transform: uppercase;
            letter-spacing: 2px;
            margin-bottom: 12px;
        }

        .header p {
            font-size: 16px;
            color: #777;
        }

        /* TITRES DE CATÉGORIES DESIGN */
        .category-title {
            color: var(--dark);
            font-size: 20px;
            font-weight: 700;
            margin: 35px 0 15px 0;
            display: flex;
            align-items: center;
            gap: 8px;
        }

        .category-title::after {
            content: '';
            flex: 1;
            height: 2px;
            background: linear-gradient(to right, var(--primary-light), transparent);
        }

        /* CARTES DE SERVICES ÉPURÉES */
        .card {
            background: var(--bg-card);
            padding: 22px;
            border-radius: 24px;
            margin-bottom: 16px;
            box-shadow: 0 10px 25px rgba(216, 27, 96, 0.05);
            border: 1px solid rgba(216, 27, 96, 0.08);
            transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
        }

        .card.selected-card {
            border-color: var(--success-light);
            box-shadow: 0 10px 30px rgba(37, 211, 102, 0.15);
            background-color: #f7fdf9;
            transform: translateY(-2px);
        }

        .card h2 {
            color: var(--dark);
            font-size: 20px;
            font-weight: 600;
            margin-bottom: 6px;
        }

        .price {
            font-size: 22px;
            font-weight: 700;
            color: var(--primary);
            margin-bottom: 18px;
        }

        /* INPUTS MODERNES */
        .input-group {
            display: flex;
            gap: 10px;
            margin-bottom: 15px;
        }

        input {
            flex: 1;
            padding: 14px;
            border-radius: 14px;
            border: 1px solid #e0e0e0;
            font-size: 15px;
            background-color: #fafafa;
            color: var(--text);
            outline: none;
            transition: 0.2s;
        }

        input:focus {
            border-color: var(--primary);
            background-color: #fff;
        }

        /* BOUTONS AVEC DES EFFETS MODERNES */
        .btn {
            width: 100%;
            padding: 14px;
            border: none;
            border-radius: 16px;
            font-weight: 600;
            cursor: pointer;
            font-size: 16px;
            display: flex;
            justify-content: center;
            align-items: center;
            gap: 8px;
            box-shadow: 0 4px 10px rgba(0, 0, 0, 0.05);
            transition: all 0.2s ease;
        }

        .whatsapp {
            background: var(--success-light);
            color: white;
        }

        .whatsapp.active {
            background: var(--success);
            box-shadow: inset 0 2px 5px rgba(0,0,0,0.2);
        }

        .btn:hover {
            transform: translateY(-1px);
            filter: brightness(1.03);
        }

        .btn:active {
            transform: translateY(1px);
        }

        /* BARRE DE TOTAL SUBLIME ET FIXE */
        .total-bar {
            position: fixed;
            bottom: 0;
            left: 0;
            width: 100%;
            background: linear-gradient(135deg, #2b0816 0%, var(--dark) 100%);
            color: white;
            padding: 20px;
            box-shadow: 0 -10px 30px rgba(0,0,0,0.25);
            display: none;
            flex-direction: column;
            align-items: center;
            gap: 15px;
            z-index: 1000;
            border-top-left-radius: 28px;
            border-top-right-radius: 28px;
            animation: slideUp 0.4s cubic-bezier(0.4, 0, 0.2, 1);
        }

        @keyframes slideUp {
            from { transform: translateY(100%); }
            to { transform: translateY(0); }
        }

        .total-info {
            text-align: center;
        }

        .total-title {
            font-size: 24px;
            font-weight: 700;
            letter-spacing: 0.5px;
        }

        .total-details {
            font-size: 13px;
            color: #ffccd8;
            margin-top: 4px;
            font-weight: 500;
            max-width: 90%;
            margin-left: auto;
            margin-right: auto;
        }

        .pix-main {
            background: linear-gradient(135deg, #a239be 0%, var(--secondary) 100%);
            color: white;
            max-width: 400px;
            box-shadow: 0 6px 15px rgba(142, 36, 170, 0.3);
        }

        .footer {
            text-align: center;
            margin-top: 45px;
            font-size: 14px;
            color: #999;
            font-weight: 500;
        }
    </style>
</head>
