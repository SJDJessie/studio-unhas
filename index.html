<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Agendamento - Espaço Estética</title>
    <style>
        :root {
            --pink-main: #db7093;
            --pink-light: #fff0f5;
            --text-dark: #333;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: var(--pink-light);
            color: var(--text-dark);
            margin: 0;
            padding: 20px;
            display: flex;
            justify-content: center;
        }

        .container {
            background-color: #ffffff;
            max-width: 500px;
            width: 100%;
            border-radius: 15px;
            padding: 25px;
            box-shadow: 0 4px 15px rgba(0,0,0,0.1);
        }

        h1 {
            text-align: center;
            color: var(--pink-main);
            margin-bottom: 5px;
        }

        .subtitle {
            text-align: center;
            font-style: italic;
            color: #777;
            margin-bottom: 25px;
        }

        .services-list {
            display: flex;
            flex-direction: column;
            gap: 12px;
        }

        .service-item {
            border: 2px solid #eee;
            border-radius: 10px;
            padding: 15px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            cursor: pointer;
            transition: all 0.3s ease;
        }

        .service-item:hover {
            border-color: var(--pink-main);
            background-color: #fff9fa;
        }

        .service-item.selected {
            border-color: var(--pink-main);
            background-color: var(--pink-light);
            font-weight: bold;
        }

        .service-name {
            font-size: 16px;
        }

        .service-price {
            color: var(--pink-main);
            font-size: 16px;
        }

        .checkout-section {
            margin-top: 30px;
            border-top: 2px dashed #eee;
            padding-top: 20px;
            display: none; /* Caché par défaut, affiché via JS */
        }

        .total-box {
            display: flex;
            justify-content: space-between;
            font-size: 18px;
            font-weight: bold;
            margin-bottom: 20px;
        }

        .pix-btn {
            background-color: #32bcad; /* Couleur officielle du Pix */
            color: white;
            border: none;
            border-radius: 8px;
            padding: 15px;
            width: 100%;
            font-size: 16px;
            font-weight: bold;
            cursor: pointer;
            transition: background 0.3s;
        }

        .pix-btn:hover {
            background-color: #269c8f;
        }
    </style>
</head>
<body>

<div class="container">
    <h1>Espaço Beleza & Estética</h1>
    <p class="subtitle">Escolha o serviço desejado para agendar</p>

    <!-- Lista de Serviços -->
    <div class="services-list" id="servicesContainer"></div>

    <!-- Seção de Pagamento -->
    <div class="checkout-section" id="checkoutSection">
        <div class="total-box">
            <span>Total a pagar:</span>
            <span id="totalPrice">R$ 0,00</span>
        </div>
        <button class="pix-btn" onclick="prosseguirPagamento()">Pagar com PIX</button>
    </div>
</div>

<script>
    // 1. Array de objetos contendo os serviços da sua irmã
    const servicos = [
        { id: 1, nome: "Alongamento de fibra", preco: 200 },
        { id: 2, nome: "Manutenção de alongamento de fibra", preco: 120 },
        { id: 3, nome: "Alongamento de gel", preco: 120 },
        { id: 4, nome: "Manutenção de gel", preco: 80 },
        { id: 5, nome: "Banho de gel", preco: 80 },
        { id: 6, nome: "Unha normal", preco: 30 },
        { id: 7, nome: "Unha postiça", preco: 100 }
    ];

    let servicoSelecionado = null;

    // 2. Função para renderizar os serviços na tela (DOM)
    const container = document.getElementById('servicesContainer');
    
    servicos.forEach(servico => {
        const item = document.createElement('div');
        item.classList.add('service-item');
        item.setAttribute('data-id', servico.id);
        item.innerHTML = `
            <span class="service-name">${servico.nome}</span>
            <span class="service-price">R$ ${servico.preco},00</span>
        `;
        
        // Evento de clique para selecionar
        item.addEventListener('click', () => selecionarServico(servico, item));
        container.appendChild(item);
    });

    // 3. Lógica de seleção
    function selecionarServico(servico, elemento) {
        // Remove a seleção dos outros
        document.querySelectorAll('.service-item').forEach(el => el.classList.remove('selected'));
        
        // Ativa o atual
        elemento.classList.add('selected');
        servicoSelecionado = servico;

        // Atualiza e mostra a seção de pagamento
        document.getElementById('totalPrice').innerText = `R$ ${servico.preco},00`;
        document.getElementById('checkoutSection').style.display = 'block';
    }

    // 4. Ação do botão PIX
    function prosseguirPagamento() {
        if (servicoSelecionado) {
            alert(`Você selecionou: ${servicoSelecionado.nome}\nValor: R$ ${servicoSelecionado.preco},00\n\nPróximo passo: Integração com o Pix!`);
            // Aqui vamos programar a lógica para exibir a chave Pix ou gerar o QR Code.
        }
    }
</script>

</body>
</html>
