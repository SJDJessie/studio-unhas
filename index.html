<!DOCTYPE html>
<html lang="pt-BR">

<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Studio de Unhas</title>

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:Arial,sans-serif;
}

body{
background:linear-gradient(to bottom,#ffe6f2,#ffffff);
padding:20px;
color:#333;
}

.container{
max-width:750px;
margin:auto;
}

.header{
text-align:center;
margin-bottom:30px;
}

.header h1{
font-size:40px;
color:#d81b60;
margin-bottom:10px;
}

.header p{
font-size:18px;
color:#666;
}

.card{
background:white;
padding:20px;
border-radius:20px;
margin-bottom:20px;
box-shadow:0 5px 15px rgba(0,0,0,0.1);
}

.service{
display:flex;
justify-content:space-between;
align-items:center;
padding:12px;
border-bottom:1px solid #eee;
}

.service label{
font-size:18px;
font-weight:bold;
}

.price{
color:#c2185b;
font-weight:bold;
}

input[type="checkbox"]{
transform:scale(1.4);
margin-right:10px;
}

.inputs{
margin-top:20px;
}

.inputs input{
width:100%;
padding:12px;
margin-bottom:10px;
border-radius:10px;
border:1px solid #ccc;
font-size:16px;
}

.total{
margin-top:20px;
font-size:24px;
font-weight:bold;
text-align:center;
color:#d81b60;
}

.buttons{
display:flex;
gap:10px;
margin-top:20px;
flex-wrap:wrap;
}

.btn{
flex:1;
padding:14px;
border:none;
border-radius:12px;
font-size:16px;
font-weight:bold;
cursor:pointer;
transition:0.3s;
}

.whatsapp{
background:#25D366;
color:white;
}

.pix{
background:#8e24aa;
color:white;
}

.btn:hover{
opacity:0.85;
}

</style>

</head>

<body>

<div class="container">

<div class="header">

<h1>💅 Studio de Unhas</h1>

<p>
✨ Escolha seus serviços favoritos e agende seu horário facilmente pelo WhatsApp 💖
</p>

</div>

<div class="card">

<div id="services"></div>

<div class="inputs">

<input type="date" id="date">

<input type="time" id="time">

</div>

<div class="total" id="total">

Total: R$ 0

</div>

<div class="buttons">

<button class="btn whatsapp"

onclick="marcarHorario()">

📅 Marcar horário

</button>

<button class="btn pix"

onclick="pagarPix()">

💳 Pagar com Pix

</button>

</div>

</div>

</div>

<script>

const whatsapp = '5511954845853';

const pixKey = 'simon.c.personnal@gmail.com';

const services = [

{
name:'Alongamento de fibra',
price:200
},

{
name:'Manutenção de alongamento de fibra',
price:120
},

{
name:'Alongamento de gel',
price:120
},

{
name:'Manutenção de gel',
price:80
},

{
name:'Banho de gel',
price:80
},

{
name:'Unha normal',
price:30
},

{
name:'Unha postiça',
price:100
}

];

const container = document.getElementById('services');

services.forEach((service,index)=>{

container.innerHTML += `

<div class="service">

<label>

<input type="checkbox"

value="${service.price}"

data-name="${service.name}"

onchange="calcularTotal()">

${service.name}

</label>

<span class="price">

R$ ${service.price}

</span>

</div>

`;

});

function calcularTotal(){

const checkboxes = document.querySelectorAll('input[type=\"checkbox\"]');

let total = 0;

checkboxes.forEach(box=>{

if(box.checked){

total += Number(box.value);

}

});

document.getElementById('total').innerText =

'Total: R$ ' + total;

}

function pegarServicos(){

const checkboxes = document.querySelectorAll('input[type=\"checkbox\"]');

let servicos = [];

let total = 0;

checkboxes.forEach(box=>{

if(box.checked){

servicos.push(box.dataset.name);

total += Number(box.value);

}

});

return {servicos,total};

}

function marcarHorario(){

const dados = pegarServicos();

const data = document.getElementById('date').value;

const hora = document.getElementById('time').value;

if(dados.servicos.length === 0){

alert('Escolha pelo menos um serviço');

return;

}

const mensagem =

`Olá! Quero agendar:

Serviços:
- ${dados.servicos.join('\\n- ')}

Total: R$ ${dados.total}

Data: ${data}
Hora: ${hora}`;

const link =

`https://wa.me/${whatsapp}?text=${encodeURIComponent(mensagem)}`;

window.open(link,'_blank');

}

function pagarPix(){

const dados = pegarServicos();

if(dados.servicos.length === 0){

alert('Escolha pelo menos um serviço');

return;

}

navigator.clipboard.writeText(pixKey);

alert(

'Serviços escolhidos:\\n- ' +

dados.servicos.join('\\n- ') +

'\\n\\nTotal: R$ ' +

dados.total +

'\\n\\nChave Pix copiada:\\n' +

pixKey

);

}

</script>

</body>

</html>
