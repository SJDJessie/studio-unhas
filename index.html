<script>

const whatsapp = '5511954845853';
const pixKey = 'simon.c.personnal@gmail.com';

const services = [

{ id:1, category:'cabelo', name:'Escova e Lavagem', price:60 },

{ id:2, category:'cabelo', name:'Corte de Cabelo', price:80 },

{ id:3, category:'maquiagem', name:'Maquiagem Simples', price:100 },

{ id:4, category:'maquiagem', name:'Maquiagem Profissional', price:180 },

{ id:5, category:'unhas', name:'Alongamento de fibra', price:200 },

{ id:6, category:'unhas', name:'Manutenção de fibra', price:120 },

{ id:7, category:'unhas', name:'Unha normal', price:30 }

];

let selectedServices = {};

services.forEach(service=>{

const categoryContainer=document.getElementById(`${service.category}-services`);

const card=document.createElement('div');

card.className='card';

card.id=`card-${service.id}`;

card.innerHTML=`

<h2>${service.name}</h2>

<div class="price">R$ ${service.price}</div>

<div class="input-group">

<input type="date" id="date-${service.id}">

<input type="time" id="time-${service.id}">

</div>

<button class="btn whatsapp" id="btn-${service.id}" onclick="toggleService(${service.id})">

📅 Marcar horário

</button>

`;

categoryContainer.appendChild(card);

});

function toggleService(id){

const service=services.find(s=>s.id===id);

const card=document.getElementById(`card-${id}`);

const btn=document.getElementById(`btn-${id}`);

const dateVal=document.getElementById(`date-${id}`).value;

const timeVal=document.getElementById(`time-${id}`).value;

if(selectedServices[id]){

delete selectedServices[id];

card.classList.remove('selected-card');

btn.classList.remove('active');

btn.innerHTML='📅 Marcar horário';

}else{

selectedServices[id]={

name:service.name,

price:service.price,

date:dateVal,

time:timeVal

};

card.classList.add('selected-card');

btn.classList.add('active');

btn.innerHTML='✅ Selecionado';

}

calculerSomme();

}

function calculerSomme(){

const totalBar=document.getElementById('totalBar');

const totalValue=document.getElementById('totalValue');

const totalDetails=document.getElementById('totalDetails');

let total=0;

let details=[];

Object.keys(selectedServices).forEach(id=>{

total+=selectedServices[id].price;

details.push(selectedServices[id].name);

});

if(total<=0){

totalBar.style.display='none';

return;

}

totalBar.style.display='flex';

totalValue.innerHTML=`Total: R$ ${total}`;

totalDetails.innerHTML=details.join(', ');

}

function pagarPixTotal(){

navigator.clipboard.writeText(pixKey);

let total = 0;

let messageServices = '';

Object.keys(selectedServices).forEach(id => {

let s = selectedServices[id];

total += s.price;

let dataFormatada = s.date
? s.date.split('-').reverse().join('/')
: 'Não definida';

let horaFormatada = s.time || 'Não definida';

messageServices += `
━━━━━━━━━━━━━━━
✨ ${s.name}

📅 Data: ${dataFormatada}
⏰ Hora: ${horaFormatada}
💰 Valor: R$ ${s.price}
`;

});

alert(
'✨ Chave Pix copiada com sucesso!\\n\\n' +
'💖 Obrigado por escolher o Studio SJD!'
);

const mensagem = `✨ *STUDIO SJD* ✨

Olá 😊

Gostaria de agendar os seguintes serviços:

${messageServices}

━━━━━━━━━━━━━━━

💰 *Total Geral:* R$ ${total}

💳 Pagamento via Pix

💖 Obrigado por escolher o Studio SJD!

Será um prazer cuidar da sua beleza ✨

📲 Aguardo a confirmação do meu horário.

💕 Tenha um dia maravilhoso!`;

const link =
`https://wa.me/${whatsapp}?text=${encodeURIComponent(mensagem)}`;

window.open(link,'_blank');

}

</script>
